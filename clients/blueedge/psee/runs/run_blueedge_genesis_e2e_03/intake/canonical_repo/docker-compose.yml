# Blue Edge Fleet Management — Docker Compose
# Full stack: Frontend + Backend + PostgreSQL + TimescaleDB + Redis

version: '3.9'

services:
  # ─── PostgreSQL + TimescaleDB ───
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: blueedge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-blueedge_fleet}
      POSTGRES_USER: ${DB_USER:-blueedge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blueedge_secret_2026}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-blueedge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: blueedge-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-blueedge_redis_2026}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-blueedge_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blueedge-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-blueedge_fleet}
      DB_USER: ${DB_USER:-blueedge}
      DB_PASSWORD: ${DB_PASSWORD:-blueedge_secret_2026}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-blueedge_redis_2026}
      JWT_SECRET: ${JWT_SECRET:-blueedge_jwt_secret_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Frontend ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: blueedge-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_SSL_PORT:-443}:443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: blueedge-network
