# ══════════════════════════════════════════════════════════════
# Blue Edge Fleet — Monitoring Stack (Prometheus + Grafana)
# Usage: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# ══════════════════════════════════════════════════════════════

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: blueedge-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - blueedge-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: blueedge-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-blueedge2026}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-localhost}
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - blueedge-net

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: blueedge-node-exporter
    restart: unless-stopped
    ports:
      - '9100:9100'
    networks:
      - blueedge-net

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: blueedge-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis:6379
    ports:
      - '9121:9121'
    networks:
      - blueedge-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  blueedge-net:
    external: true
