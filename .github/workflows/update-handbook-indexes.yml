name: Update Handbook Indexes

on:
  push:
    branches:
      - main

jobs:
  update-indexes:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x scripts/generate-stream-indexes.sh

      - name: Generate stream indexes
        run: ./scripts/generate-stream-indexes.sh

      - name: Commit updated indexes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add docs/handbook

          git diff --cached --quiet || git commit -m "Auto-update handbook stream indexes"

      - name: Push changes
        run: git push
