# ---------------------------------------------------------------------------

invariants:
  - signal_ids: [SIG-001, SIG-002, SIG-003, SIG-004, SIG-005]
  - all_field_values_verbatim_from: docs/pios/41.4/signal_registry.json
  - all_evidence_verbatim_from: docs/pios/41.4/evidence_mapping_index.json
  - synthesis_state_source: pios/core/v0.1/engine/synthesize_intelligence.py output
  - no_runtime_signal_computation: true
  - no_direct_core_coupling: true
  - fixed_source_path: runs/pios/adapter/run_01_demo_compat_verification/demo_compat_output.json

# ---------------------------------------------------------------------------
# Forbidden
# ---------------------------------------------------------------------------

forbidden:
  - bind to "latest" run discovery
  - bind directly to compute_signals.py, activate_conditions.py, synthesize_intelligence.py
  - silent fallback to ADAPTER_42_4 signals on binding source failure
  - modify bound_signals values
  - modify signal field schema
