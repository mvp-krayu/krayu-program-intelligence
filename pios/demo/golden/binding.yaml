# ---------------------------------------------------------------------------

bound_paths:
  - app/execlens-demo/pages/api/execlens.js  # ADAPTER_PIOS_SOURCE + query handler

unchanged_paths:
  - app/execlens-demo/pages/index.js
  - app/execlens-demo/components/
  - app/execlens-demo/utils/
  - scripts/pios/42.4/execlens_adapter.py    # still provides query context
  - scripts/pios/42.6/execlens_overview_adapter.py  # gauge strip unaffected
  - scripts/pios/42.7/execlens_topology_adapter.py  # topology unaffected
  - pios/core/v0.1/engine/                   # Core executables untouched
  - pios/core/v0.1/adapters/demo_compat/     # adapter source untouched

# ---------------------------------------------------------------------------
