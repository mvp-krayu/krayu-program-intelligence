    Single-query handler (?query=) reads adapter signals from ADAPTER_PIOS_SOURCE
    (fs.readFileSync, fail-closed). Query context (navigation, template_section,
    aggregate_confidence) from ADAPTER_42_4 chain unchanged.
    Legacy implicit signal source (ADAPTER_42_4 signals array) replaced.
    No fallback to legacy source. No dynamic discovery. No "latest" resolution.

# ---------------------------------------------------------------------------
